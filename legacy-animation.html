<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Shell method animation</title>
    <style>
      html,body,#scene{width:100%;height:100%;margin:0;overflow:hidden;background:#ede6d8}canvas{display:block;width:100%;height:100%;touch-action:none}.hidden{display:none}
    </style>
  </head>
  <body>
    <main id="scene"></main>
    <div class="hidden">
      <input id="progress" type="range" min="0" max="1" step="0.001" value="0"><select id="playbackMode"><option value="loop">Loop</option><option value="once">Once</option></select><input id="speed" type="range" min="0.25" max="3" step="0.05" value="1"><input id="shells" type="range" min="4" max="48" step="1" value="14">
      <button id="play">Pause</button><button id="reset">Reset</button><b id="xReadout"></b><b id="hReadout"></b>
      <select id="example"><option value="problem-shell-parabola-y">Shell method</option><option value="problem-arc-parabola">Arc length</option><option value="problem-surface-line">Surface area</option><option value="dynamic">Current problem</option></select><h1 id="exampleTitle"></h1><p id="exampleSubtitle"></p><div id="formula"></div><button id="toggleFormula"></button>
      <span id="sampleLabel"></span><span id="measureLabel"></span><span id="stepRegionText"></span><span id="stepSliceText"></span><span id="stepRotateText"></span><span id="stepStackText"></span><span id="legendSlice"></span><span id="legendSolid"></span>
      <div id="step-region"></div><div id="step-slice"></div><div id="step-rotate"></div><div id="step-stack"></div>
    </div>
    <script type="module" src="/src/original-shell.js"></script>
  </body>
</html>
